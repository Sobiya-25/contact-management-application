{% extends 'base.html' %}
{% block content %}

<h3>Edit Contact</h3>

<form method="POST">
<input name="first_name" value="{{ contact[1] }}">
<input name="last_name" value="{{ contact[2] }}">
<input name="address" value="{{ contact[3] }}">
<input name="email" value="{{ contact[5] }}">
<input name="phone" value="{{ contact[6] }}">

<button>Update</button>
</form>

{% endblock %}
